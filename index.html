<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    #ar-button {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: white;
      color: black;
      border-radius: 24px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 9999;
    }
  </style>
</head>
<body>
  <model-viewer
    src="duck.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    alt="A 3D model">
    <button slot="ar-button" id="ar-button">
      View in your space
    </button>
  </model-viewer>
</body>
</html>

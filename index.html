<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    #ar-button {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 10px 16px;
      background: white;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }
  </style>
</head>
<body style="margin:0">
  <model-viewer
    src="duck.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    tone-mapping="neutral"
    shadow-intensity="1"
    style="width:100%; height:100vh"
    alt="A 3D model">
    <button slot="ar-button" id="ar-button">
      View in your space
    </button>
  </model-viewer>
</body>
</html>
